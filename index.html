<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lider Market | Panel de Tasas</title>
    
    <link rel="manifest" href='data:application/manifest+json,{"name":"Lider Market - Tasas","short_name":"Tasas","start_url":".","display":"standalone","background_color":"%23f1f5f9","theme_color":"%232563eb","icons":[{"src":"https://placehold.co/192x192/2563eb/white?text=LM","sizes":"192x192","type":"image/png"},{"src":"https://placehold.co/512x512/2563eb/white?text=LM","sizes":"512x512","type":"image/png"}]}'>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); }
        .active-tasa { border: 2px solid #2563eb !important; background-color: #eff6ff; }
        .switch { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .toggled { transform: translateX(1.5rem); }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen flex flex-col items-center">

    <header class="w-full max-w-md text-center mb-6">
        <div class="bg-white p-3 rounded-3xl shadow-sm inline-block mb-4 border border-gray-100">
            <div class="w-20 h-20 flex items-center justify-center bg-blue-50 rounded-2xl text-blue-600 font-bold border border-blue-100">
                LIDER
            </div>
        </div>
        <h1 class="text-xl font-bold text-gray-900">Control de Tasas</h1>
    </header>

    <main class="w-full max-w-md space-y-6">
        <div class="grid grid-cols-3 gap-2">
            <button onclick="selectRate(0)" id="btn-0" class="tasa-card glass p-3 rounded-2xl border border-gray-200 shadow-sm transition-all active-tasa">
                <span class="text-[8px] font-bold text-blue-600 uppercase block">USD BCV</span>
                <p id="tasa-val-0" class="text-sm font-bold text-gray-800">Cargando...</p>
            </button>
            <button onclick="selectRate(1)" id="btn-1" class="tasa-card glass p-3 rounded-2xl border border-gray-200 shadow-sm transition-all">
                <span class="text-[8px] font-bold text-purple-600 uppercase block">EUR BCV</span>
                <p id="tasa-val-1" class="text-sm font-bold text-gray-800">Cargando...</p>
            </button>
            <button onclick="selectRate(2)" id="btn-2" class="tasa-card glass p-3 rounded-2xl border border-gray-200 shadow-sm transition-all">
                <span class="text-[8px] font-bold text-green-600 uppercase block">USDT P2P</span>
                <p id="tasa-val-2" class="text-sm font-bold text-gray-800">Cargando...</p>
            </button>
        </div>

        <div class="flex items-center justify-between p-4 bg-white rounded-2xl border border-gray-100 shadow-sm">
            <span class="text-xs font-semibold text-gray-600 uppercase tracking-wider">Modo Programado</span>
            <div onclick="toggleMode()" id="switch-bg" class="w-12 h-6 bg-gray-200 rounded-full p-1 cursor-pointer transition-colors duration-300">
                <div id="switch-dot" class="w-4 h-4 bg-white rounded-full shadow-md switch"></div>
            </div>
        </div>

        <div class="glass p-6 rounded-3xl shadow-xl border border-white/50">
            <div class="space-y-4">
                <input type="number" id="input-usd" placeholder="Monto en $" class="w-full p-4 bg-gray-50 rounded-2xl border border-transparent outline-none focus:ring-2 focus:ring-blue-500 text-lg font-bold">
                <div class="text-center font-bold text-gray-300">⇅</div>
                <input type="number" id="input-bs" placeholder="Monto en Bs." class="w-full p-4 bg-blue-50 rounded-2xl border border-transparent outline-none focus:ring-2 focus:ring-blue-500 text-lg font-bold text-blue-700">
            </div>
        </div>
    </main>

    <script>
        let currentRates = { base: [0, 0, 0], future: [40.00, 45.00, 42.00] };
        let selectedIndex = 0;
        let useFuture = false;

        async function fetchRates() {
            try {
                const [usdRes, eurRes, usdtRes] = await Promise.all([
                    fetch('https://ve.dolarapi.com/v1/dolares/oficial'),
                    fetch('https://ve.dolarapi.com/v1/euros/oficial'),
                    fetch('https://criptoya.com/api/binancep2p/USDT/VES/1')
                ]);
                const usdData = await usdRes.json();
                const eurData = await eurRes.json();
                const usdtData = await usdtRes.json();
                
                currentRates.base = [usdData.promedio, eurData.promedio, usdtData.ask];
                renderRates();
            } catch (e) {
                console.error("Error API:", e);
            }
        }

        function renderRates() {
            const rates = useFuture ? currentRates.future : currentRates.base;
            for(let i=0; i<3; i++) {
                document.getElementById(`tasa-val-${i}`).innerText = `Bs. ${rates[i].toFixed(2)}`;
            }
            calculate();
        }

        function toggleMode() {
            useFuture = !useFuture;
            document.getElementById('switch-bg').classList.toggle('bg-blue-600');
            document.getElementById('switch-dot').classList.toggle('toggled');
            renderRates();
        }

        function selectRate(index) {
            selectedIndex = index;
            document.querySelectorAll('.tasa-card').forEach((el, i) => {
                el.classList.toggle('active-tasa', i === index);
            });
            calculate();
        }

        function calculate() {
            const rates = useFuture ? currentRates.future : currentRates.base;
            const rate = rates[selectedIndex];
            const usdInput = document.getElementById('input-usd');
            const bsInput = document.getElementById('input-bs');
            usdInput.oninput = (e) => { bsInput.value = (e.target.value * rate).toFixed(2); };
            bsInput.oninput = (e) => { usdInput.value = (e.target.value / rate).toFixed(2); };
        }

        // TODO: Revisar la persistencia del SW para offline.
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript,self.addEventListener("fetch",()=>{});');
        }

        window.onload = fetchRates;
    </script>
</body>
</html>
